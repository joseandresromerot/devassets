name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: devassets_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @devassets/server exec prisma generate

      - name: Run migrations
        run: pnpm --filter @devassets/server exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/devassets_test

      - name: Run backend tests
        run: pnpm --filter @devassets/server test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/devassets_test
          JWT_SECRET: test-secret
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm --filter @devassets/web test
        env:
          NEXTAUTH_SECRET: test-secret
          AUTH_GOOGLE_ID: placeholder
          AUTH_GOOGLE_SECRET: placeholder
          NEXT_PUBLIC_SERVER_URL: http://localhost:3001
