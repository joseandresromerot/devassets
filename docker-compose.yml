services:
  postgres:
    image: postgres:16-alpine
    container_name: devassets-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devassets
    ports:
      - "5434:5432"
    volumes:
      - devassets_postgres_data:/var/lib/postgresql/data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql

volumes:
  devassets_postgres_data:
